name: Build macOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow pystray python-dotenv supabase httpx psutil
        
    - name: Build macOS app
      run: |
        python build_release_mac.py
        
    - name: Create .app bundle
      run: |
        mkdir -p "呼吸泡泡.app/Contents/MacOS"
        mkdir -p "呼吸泡泡.app/Contents/Resources"
        cp -r "dist/呼吸泡泡/"* "呼吸泡泡.app/Contents/MacOS/"
        
        cat > "呼吸泡泡.app/Contents/Info.plist" << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>zh_CN</string>
            <key>CFBundleExecutable</key>
            <string>呼吸泡泡</string>
            <key>CFBundleIconFile</key>
            <string>app_icon</string>
            <key>CFBundleIdentifier</key>
            <string>com.mindfulbreathing.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>呼吸泡泡</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.14</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        
        cp app_icon.png "呼吸泡泡.app/Contents/Resources/app_icon.png" 2>/dev/null || true
        chmod +x "呼吸泡泡.app/Contents/MacOS/呼吸泡泡"
        zip -r "呼吸泡泡-macOS.zip" "呼吸泡泡.app"
        
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0
        name: "呼吸泡泡 macOS 版"
        body: "自动打包的 macOS 版本"
        files: 呼吸泡泡-macOS.zip
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}