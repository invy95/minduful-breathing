name: Build macOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow pystray python-dotenv supabase httpx psutil
        
    - name: Build macOS app
      run: |
        python build_release_mac.py
        
    - name: Create .app bundle
      run: |
        mkdir -p "е‘јеђёжіЎжіЎ.app/Contents/MacOS"
        mkdir -p "е‘јеђёжіЎжіЎ.app/Contents/Resources"
        cp -r "dist/е‘јеђёжіЎжіЎ/"* "е‘јеђёжіЎжіЎ.app/Contents/MacOS/"
        
        cat > "е‘јеђёжіЎжіЎ.app/Contents/Info.plist" << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>zh_CN</string>
            <key>CFBundleExecutable</key>
            <string>е‘јеђёжіЎжіЎ</string>
            <key>CFBundleIconFile</key>
            <string>app_icon</string>
            <key>CFBundleIdentifier</key>
            <string>com.mindfulbreathing.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>е‘јеђёжіЎжіЎ</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.14</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        
        cp app_icon.png "е‘јеђёжіЎжіЎ.app/Contents/Resources/app_icon.png" 2>/dev/null || true
        chmod +x "е‘јеђёжіЎжіЎ.app/Contents/MacOS/е‘јеђёжіЎжіЎ"
        zip -r "е‘јеђёжіЎжіЎ-macOS.zip" "е‘јеђёжіЎжіЎ.app"
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: е‘јеђёжіЎжіЎ-macOS
        path: е‘јеђёжіЎжіЎ-macOS.zip
