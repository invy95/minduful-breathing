<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4fff9" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#d8f3ea" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c8e6dc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="petalGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e9fbf5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#bfe3d7" stop-opacity="0.35"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <g transform="translate(400,400)" filter="url(#softBlur)">
    <g id="petal">
      <ellipse cx="0" cy="-180" rx="120" ry="220" fill="url(#petalGrad)"/>
    </g>
    <use href="#petal" transform="rotate(30)"/>
    <use href="#petal" transform="rotate(60)"/>
    <use href="#petal" transform="rotate(90)"/>
    <use href="#petal" transform="rotate(120)"/>
    <use href="#petal" transform="rotate(150)"/>
    <use href="#petal" transform="rotate(180)"/>
    <use href="#petal" transform="rotate(210)"/>
    <use href="#petal" transform="rotate(240)"/>
    <use href="#petal" transform="rotate(270)"/>
    <use href="#petal" transform="rotate(300)"/>
    <use href="#petal" transform="rotate(330)"/>
    <g opacity="0.6">
      <ellipse cx="0" cy="-120" rx="80" ry="150" fill="url(#petalGrad)"/>
      <use href="#petal" transform="scale(0.6) rotate(30)"/>
      <use href="#petal" transform="scale(0.6) rotate(60)"/>
      <use href="#petal" transform="scale(0.6) rotate(90)"/>
      <use href="#petal" transform="scale(0.6) rotate(120)"/>
      <use href="#petal" transform="scale(0.6) rotate(150)"/>
    </g>
    <circle cx="0" cy="0" r="160" fill="url(#centerGlow)"/>
  </g>
</svg>
